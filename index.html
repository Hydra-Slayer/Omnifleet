<!DOCTYPE html>
<html>

<head>
    <title>Vehicle AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

<body class="bg-gray-900 text-white p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Telematics AI Monitor</h1>
        <div class="flex gap-4">
            <select id="nodeSelect" class="bg-gray-800 p-2 rounded border border-gray-600">
                <option value="NODE1">NODE 1</option>
                <option value="NODE2">NODE 2</option>
                <option value="NODE3">NODE 3</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-blue-500">
            <p class="text-gray-400">Engine Temp</p>
            <h2 id="eng_temp" class="text-4xl font-mono">--</h2>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-green-500">
            <p class="text-gray-400">Battery Voltage</p>
            <h2 id="batt_volt" class="text-4xl font-mono">--</h2>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-purple-500">
            <p class="text-gray-400">Vibration (Z)</p>
            <h2 id="vib_z" class="text-4xl font-mono">--</h2>
        </div>
        <div id="status_card" class="bg-gray-800 p-6 rounded-xl border-l-4 border-gray-500">
            <p class="text-gray-400">AI Status</p>
            <h2 id="ai_status" class="text-2xl font-bold">SCANNING...</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3 class="mb-4">Live Vibration Stream</h3>
            <canvas id="liveChart"></canvas>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3 class="mb-4">Historical Engine Heat (DynamoDB)</h3>
            <canvas id="histChart"></canvas>
        </div>
    </div>

    <script>
        let current_node = "NODE1";
        const nodeSelect = document.getElementById('nodeSelect');
        nodeSelect.addEventListener('change', (e) => {
            current_node = e.target.value;
            fetchHistory(); // Reload historical graph on node change
        });

        // Setup Charts
        const ctxLive = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctxLive, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Vibration', data: [], borderColor: '#a855f7' }] }
        });

        // WebSocket Connection
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onmessage = (event) => {
            const allNodes = JSON.parse(event.data);
            const data = allNodes[current_node].live;

            // Check if we actually have data yet
            if (!data || Object.keys(data).length === 0) {
                document.getElementById('ai_status').innerText = "WAITING FOR NODE...";
                return;
            }

            // Update Gauges (Ensure these keys match your ESP32 JSON exactly!)
            document.getElementById('eng_temp').innerText = (data.engine_temp || 0) + "°C";
            document.getElementById('batt_volt').innerText = (data.battery_voltage || 0).toFixed(2) + "V";
            document.getElementById('vib_z').innerText = (data.vibration || 0).toFixed(2);

            // Update Status and AI Score
            const aiStatus = allNodes[current_node].status;
            const score = allNodes[current_node].ai_score || 0;
            document.getElementById('ai_status').innerText = `${aiStatus} (${score})`;

            // Update Status Card Color
            const card = document.getElementById('status_card');
            if (aiStatus === "Anomaly") {
                card.classList.replace('border-gray-500', 'border-red-500');
                card.classList.replace('bg-gray-800', 'bg-red-900');
            } else {
                card.classList.replace('border-red-500', 'border-gray-500');
                card.classList.replace('bg-red-900', 'bg-gray-800');
            }
        };

        let histChart; // Define globally

        async function fetchHistory() {
            try {
                const res = await fetch(`/history/${current_node}`);
                const data = await res.json();

                // 1. Sort data by timestamp (DynamoDB might return it unsorted)
                data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                // 2. Map data for the chart
                const labels = data.map(item => new Date(item.timestamp).toLocaleTimeString());
                const temperatures = data.map(item => item.engine_temp);

                // 3. Create or Update Chart
                if (histChart) {
                    histChart.data.labels = labels;
                    histChart.data.datasets[0].data = temperatures;
                    histChart.update();
                } else {
                    const ctxHist = document.getElementById('histChart').getContext('2d');
                    histChart = new Chart(ctxHist, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Engine History (°C)',
                                data: temperatures,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true
                            }]
                        }
                    });
                }
            } catch (err) {
                console.error("Failed to load DynamoDB data:", err);
            }
        }
        fetchHistory();
    </script>
</body>

</html>
