<!DOCTYPE html>
<html>

<head>
    <title>Vehicle AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-900 text-white p-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Telematics AI Monitor</h1>
        <div class="flex gap-4">
            <select id="nodeSelect" class="bg-gray-800 p-2 rounded border border-gray-600">
                <option value="NODE1">NODE 1</option>
                <option value="NODE2">NODE 2</option>
                <option value="NODE3">NODE 3</option>
            </select>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-blue-500">
            <p class="text-gray-400">Engine Temp</p>
            <h2 id="eng_temp" class="text-4xl font-mono">--</h2>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-green-500">
            <p class="text-gray-400">Battery Voltage</p>
            <h2 id="batt_volt" class="text-4xl font-mono">--</h2>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-purple-500">
            <p class="text-gray-400">Vibration (Z)</p>
            <h2 id="vib_z" class="text-4xl font-mono">--</h2>
        </div>
        <div id="status_card" class="bg-gray-800 p-6 rounded-xl border-l-4 border-gray-500">
            <p class="text-gray-400">AI Status</p>
            <h2 id="ai_status" class="text-2xl font-bold">SCANNING...</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3 class="mb-4">Live Vibration Stream</h3>
            <canvas id="liveChart"></canvas>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3 class="mb-4">Historical Engine Heat (DynamoDB)</h3>
            <canvas id="histChart"></canvas>
        </div>
    </div>

    <script>
        let current_node = "NODE1";
        const nodeSelect = document.getElementById('nodeSelect');
        nodeSelect.addEventListener('change', (e) => {
            current_node = e.target.value;
            fetchHistory(); // Reload historical graph on node change
        });

        // Setup Charts
        const ctxLive = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctxLive, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Vibration', data: [], borderColor: '#a855f7' }] }
        });

        // WebSocket Connection
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onmessage = (event) => {
            const allNodes = JSON.parse(event.data);
            const data = allNodes[current_node].live;

            if (data.engine_temp) {
                document.getElementById('eng_temp').innerText = data.engine_temp + "°C";
                document.getElementById('batt_volt').innerText = data.battery_voltage + "V";
                document.getElementById('vib_z').innerText = data.vibration.toFixed(2);
                document.getElementById('ai_status').innerText = allNodes[current_node].status;

                // Alert Injection
                const card = document.getElementById('status_card');
                if (allNodes[current_node].status === "Anomaly") {
                    card.classList.replace('border-gray-500', 'border-red-500');
                    card.classList.add('animate-pulse');
                } else {
                    card.classList.replace('border-red-500', 'border-gray-500');
                    card.classList.remove('animate-pulse');
                }

                // Update Live Graph
                if (liveChart.data.labels.length > 20) liveChart.data.labels.shift();
                if (liveChart.data.datasets[0].data.length > 20) liveChart.data.datasets[0].data.shift();
                liveChart.data.labels.push(new Date().toLocaleTimeString());
                liveChart.data.datasets[0].data.push(data.vibration);
                liveChart.update();
            }
        };

        async function fetchHistory() {
            const res = await fetch(`/history/${current_node}`);
            const data = await res.json();
            // Map DynamoDB data to histChart...
        }
        fetchHistory();
    </script>
</body>

</html>
